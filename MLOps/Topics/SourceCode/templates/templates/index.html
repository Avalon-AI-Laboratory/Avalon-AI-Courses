<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLOps - Form Prediksi Pendapatan</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 40px;
        background-color: #f8f9fa;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 800px;
        margin: auto;
        border-top: 5px solid #28a745;
      }
      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      label {
        margin-bottom: 8px;
        font-weight: 600;
        color: #495057;
        font-size: 14px;
      }
      input,
      select {
        padding: 12px;
        border: 1px solid #ced4da;
        border-radius: 8px;
        font-size: 14px;
        background-color: #fff;
      }
      input:focus,
      select:focus {
        border-color: #28a745;
        outline: none;
        box-shadow: 0 0 5px rgba(40, 167, 69, 0.2);
      }
      .full-width {
        grid-column: span 2;
      }
      button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }
      button:hover {
        background-color: #218838;
        transform: translateY(-2px);
      }
      @media (max-width: 600px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Formulir Prediksi Pendapatan (>50K)</h2>
      <form action="/result" method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label>Umur (Age):</label>
            <input type="number" name="age" placeholder="Contoh: 35" required />
          </div>

          <div class="form-group">
            <label>Kelas Pekerjaan (Workclass):</label>
            <select name="workclass" required>
              <option value="Private">Private</option>
              <option value="Self-emp-not-inc">Self-emp-not-inc</option>
              <option value="Local-gov">Local-gov</option>
              <option value="State-gov">State-gov</option>
              <option value="Self-emp-inc">Self-emp-inc</option>
              <option value="Federal-gov">Federal-gov</option>
              <option value="Without-pay">Without-pay</option>
            </select>
          </div>

          <div class="form-group">
            <label>Tingkat Pendidikan:</label>
            <select name="education" required>
              <option value="Bachelors">Bachelors</option>
              <option value="Some-college">Some-college</option>
              <option value="11th">11th</option>
              <option value="HS-grad">HS-grad</option>
              <option value="Prof-school">Prof-school</option>
              <option value="Assoc-acdm">Assoc-acdm</option>
              <option value="Assoc-voc">Assoc-voc</option>
              <option value="9th">9th</option>
              <option value="7th-8th">7th-8th</option>
              <option value="12th">12th</option>
              <option value="Masters">Masters</option>
              <option value="1st-4th">1st-4th</option>
              <option value="10th">10th</option>
              <option value="Doctorate">Doctorate</option>
              <option value="5th-6th">5th-6th</option>
              <option value="Preschool">Preschool</option>
            </select>
          </div>

          <div class="form-group">
            <label>Status Pernikahan:</label>
            <select name="marital-status" required>
              <option value="married">Married (Sudah Menikah)</option>
              <option value="not married">
                Not Married (Belum/Pernah Menikah)
              </option>
              <option value="divorced">Divorced (Cerai)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Pekerjaan (Occupation):</label>
            <select name="occupation" required>
              <option value="Tech-support">Tech-support</option>
              <option value="Craft-repair">Craft-repair</option>
              <option value="Other-service">Other-service</option>
              <option value="Sales">Sales</option>
              <option value="Exec-managerial">Exec-managerial</option>
              <option value="Prof-specialty">Prof-specialty</option>
              <option value="Handlers-cleaners">Handlers-cleaners</option>
              <option value="Machine-op-inspct">Machine-op-inspct</option>
              <option value="Adm-clerical">Adm-clerical</option>
              <option value="Farming-fishing">Farming-fishing</option>
              <option value="Transport-moving">Transport-moving</option>
              <option value="Priv-house-serv">Priv-house-serv</option>
              <option value="Protective-serv">Protective-serv</option>
              <option value="Armed-Forces">Armed-Forces</option>
            </select>
          </div>

          <div class="form-group">
            <label>Hubungan (Relationship):</label>
            <select name="relationship" required>
              <option value="Wife">Wife</option>
              <option value="Own-child">Own-child</option>
              <option value="Husband">Husband</option>
              <option value="Not-in-family">Not-in-family</option>
              <option value="Other-relative">Other-relative</option>
              <option value="Unmarried">Unmarried</option>
            </select>
          </div>

          <div class="form-group">
            <label>Ras (Race):</label>
            <select name="race" required>
              <option value="White">White</option>
              <option value="Asian-Pac-Islander">Asian-Pac-Islander</option>
              <option value="Amer-Indian-Eskimo">Amer-Indian-Eskimo</option>
              <option value="Other">Other</option>
              <option value="Black">Black</option>
            </select>
          </div>

          <div class="form-group">
            <label>Jenis Kelamin:</label>
            <select name="gender" required>
              <option value="Male">Laki-laki</option>
              <option value="Female">Perempuan</option>
            </select>
          </div>

          <div class="form-group">
            <label>Capital Gain:</label>
            <input type="number" name="capital-gain" value="0" />
          </div>

          <div class="form-group">
            <label>Capital Loss:</label>
            <input type="number" name="capital-loss" value="0" />
          </div>

          <div class="form-group">
            <label>Jam Kerja / Minggu:</label>
            <input type="number" name="hours-per-week" value="40" required />
          </div>

          <div class="form-group">
            <label>Negara Asal:</label>
            <select name="native-country" required>
              <option value="United-States">United-States</option>
              <option value="Mexico">Mexico</option>
              <option value="Philippines">Philippines</option>
              <option value="Germany">Germany</option>
              <option value="Canada">Canada</option>
              <option value="Puerto-Rico">Puerto-Rico</option>
              <option value="El-Salvador">El-Salvador</option>
              <option value="India">India</option>
              <option value="Cuba">Cuba</option>
              <option value="England">England</option>
              <option value="Jamaica">Jamaica</option>
              <option value="South">South</option>
              <option value="China">China</option>
              <option value="Italy">Italy</option>
            </select>
          </div>

          <div class="full-width">
            <button type="submit">Analisis Sekarang, Ndan!</button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
